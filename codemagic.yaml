workflows:
  ota-update:
    name: OTA Update (preview)
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      node: 20
      vars:
        EXPO_UPDATE_CHANNEL: preview
      groups:
        - soundscape
    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install
      - name: Patch expo-updates iOS dependency
        script: |
          set -e
          python3 scripts/patch_expo_updates_ios.py
      - name: Create .env file
        script: |
          set -e
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=$EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=$EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
          EXPO_PUBLIC_AGORA_APP_ID=$EXPO_PUBLIC_AGORA_APP_ID
          EOF
      - name: Push OTA update iOS
        script: |
          set -e
          CI=1 npx eas-cli update --channel preview --message "OTA da Codemagic Mac" --platform ios
      - name: Push OTA update Android
        script: |
          set -e
          CI=1 npx eas-cli update --channel preview --message "OTA da Codemagic Mac" --platform android
 
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      vars:
        EXPO_UPDATE_CHANNEL: preview
      groups:
        - soundscape
    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install
      - name: Patch expo-updates iOS dependency
        script: |
          set -e
          python3 scripts/patch_expo_updates_ios.py
      - name: Create .env file
        script: |
          set -e
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=$EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=$EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
          EXPO_PUBLIC_AGORA_APP_ID=$EXPO_PUBLIC_AGORA_APP_ID
          EOF
      - name: Expo Prebuild (no pod install)
        script: |
          set -e
          npx expo prebuild --platform ios --clean --non-interactive --no-install
          echo "=== ios/ after prebuild ==="
          ls -la ios/
          echo "=== Podfile exists? ==="
          test -f ios/Podfile && echo "YES - Podfile found" || echo "NO - Podfile MISSING"
 
      - name: Patch Podfile - disable expo-updates resources + set Swift flags
        script: |
          set -e
          python3 scripts/patch_podfile_swift.py
      - name: CocoaPods install
        script: |
          set -e
          cd ios
          echo "=== Pod version ==="
          pod --version
          echo "=== Running pod install ==="
          pod install --repo-update
          echo "=== ios/ after pod install ==="
          ls -la
          echo "=== xcworkspace check ==="
          test -d soundscapemobile.xcworkspace && echo "xcworkspace CREATED OK" || { echo "xcworkspace MISSING - FAIL"; exit 1; }
      - name: Patch expo-updates channel + disable generate script
        script: |
          set -e
          # 1. Imposta EXUpdatesChannelName nel Info.plist
          PLIST="ios/soundscapemobile/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :EXUpdatesChannelName preview" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :EXUpdatesChannelName string preview" "$PLIST"
          echo "EXUpdatesChannelName set to preview"
          # 2. Fallback: neutralizza 'Generate updates resources for expo-updates' nel pbxproj
          python3 scripts/disable_expo_updates_script.py
      - name: Build unsigned archive
        script: |
          set -e
          set -o pipefail
          export NODE_BINARY=$(which node)
          echo "Node: $NODE_BINARY ($($NODE_BINARY --version))"
          WORKSPACE="ios/soundscapemobile.xcworkspace"
          SCHEME="soundscapemobile"
          set +e
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/soundscape.xcarchive" \
            -resultBundlePath "$CM_BUILD_DIR/soundscape.xcresult" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            _EXPERIMENTAL_SWIFT_EXPLICIT_MODULES=NO \
            NODE_BINARY="$NODE_BINARY" \
            archive 2>&1 | tee /tmp/xbuild.log
          XCODE_STATUS=${PIPESTATUS[0]}
          set -e
          cp /tmp/xbuild.log "$CM_BUILD_DIR/xbuild.log" || true
          if [ -d "$CM_BUILD_DIR/soundscape.xcresult" ]; then
            xcrun xcresulttool get --legacy --path "$CM_BUILD_DIR/soundscape.xcresult" --format json > "$CM_BUILD_DIR/xcresult.json" || true
          fi
          echo "=== ACTUAL ERRORS FROM BUILD LOG ==="
          grep -nE " error:|fatal error:|clang: error:|Cycle inside|module map file|cannot load underlying module|no such module|no such file|ScanDependencies " /tmp/xbuild.log | head -300 || echo "(no matching error lines found)"
          echo "=== CONTEXT: aggregate pod target / ExpoModulesProvider ==="
          grep -nC 8 -E "Pods-soundscapemobile-dummy|ExpoModulesProvider.swift|could not build module|no such module|module map file" /tmp/xbuild.log | head -300 || echo "(no aggregate pod context found)"
          if [ -f "$CM_BUILD_DIR/xcresult.json" ]; then
            echo "=== XCRESULT DIAGNOSTICS ==="
            grep -nE '"message"|"severity"|"issueType"|Pods-soundscapemobile|ExpoModulesProvider|no such module|module map file|could not build module' "$CM_BUILD_DIR/xcresult.json" | head -300 || echo "(no xcresult diagnostics matched)"
          fi
          echo "=== LAST 220 LOG LINES ==="
          tail -220 /tmp/xbuild.log || true
          echo "====================================="
          test "$XCODE_STATUS" -eq 0
          test -d "$CM_BUILD_DIR/soundscape.xcarchive"
      - name: Export IPA
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$CM_BUILD_DIR/soundscape.xcarchive/Products/Applications/"*.app "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r soundscape.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/soundscape.ipa
      - $CM_BUILD_DIR/xbuild.log
      - $CM_BUILD_DIR/xcresult.json
      - $CM_BUILD_DIR/soundscape.xcresult
 
  android-release:
    name: Android Release APK (unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
      vars:
        EXPO_UPDATE_CHANNEL: preview
      groups:
        - soundscape
    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install
      - name: Create .env file
        script: |
          set -e
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=$EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=$EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
          EXPO_PUBLIC_AGORA_APP_ID=$EXPO_PUBLIC_AGORA_APP_ID
          EOF
      - name: Expo Prebuild Android
        script: |
          set -e
          npx expo prebuild --platform android --clean --non-interactive --no-install
 
      - name: Fix Kotlin compatibility
        script: |
          set -e
          cp patches/MusicModule.kt node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer/module/MusicModule.kt
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g" >> android/gradle.properties
 
      - name: Generate keystore
        script: |
          set -e
          keytool -genkeypair -v \
            -keystore android/app/soundscape.keystore \
            -alias soundscape \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass soundscape123 -keypass soundscape123 \
            -dname "CN=Soundscape, OU=Dev, O=Soundscape, L=IT, S=IT, C=IT"
      - name: Build release APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/soundscape.keystore" \
            -Pandroid.injected.signing.store.password=soundscape123 \
            -Pandroid.injected.signing.key.alias=soundscape \
            -Pandroid.injected.signing.key.password=soundscape123
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
